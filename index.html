<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log-Synthesizer v4 (Dual Scan)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.5; background: #1e1e1e; color: #e0e0e0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #bb86fc; margin-bottom: 5px; }
        .step-box { background: #252525; border: 1px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        h3 { margin-top: 0; color: #03dac6; }
        textarea { width: 100%; height: 120px; border: 1px solid #333; background: #2d2d2d; color: #fff; border-radius: 8px; padding: 10px; font-family: monospace; }
        .card { background: #2d2d2d; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-left: 6px solid #444; }
        .card-Poetry { border-left-color: #ff79c6; }
        .card-Proto { border-left-color: #8be9fd; }
        .card-SOP { border-left-color: #50fa7b; }
        .card-Rezept { border-left-color: #ffb86c; }
        .controls { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
        select, input { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #3d3d3d; color: white; }
        .content-edit { width: 100%; min-height: 80px; margin-top: 10px; border: 1px solid #444; background: #1e1e1e; color: #dcdcdc; padding: 10px; border-radius: 4px; }
        .actions { margin-top: 30px; position: sticky; bottom: 0; background: #1e1e1e; padding: 20px 0; border-top: 2px solid #333; text-align: center; }
        button { padding: 12px 20px; cursor: pointer; background: #6200ee; color: white; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #3700b3; }
        button.secondary { background: #03dac6; color: #000; }
        button.secondary:hover { background: #01b09b; }
        button.delete { background: #cf6679; padding: 6px 12px; }
        .hidden { display: none; }
        .status-msg { color: #03dac6; font-size: 0.9em; margin-top: 5px; min-height: 1.2em; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="container">
    <h1>Log-Synthesizer v4</h1>
    <p style="opacity: 0.7;">Interface zwischen Daily Log und Obsidian mit Format-Korrektur.</p>

    <div class="step-box">
        <h3>Schritt 1: Prompt an ChatGPT schicken</h3>
        <p>Wähle aus, welchen Prompt du kopieren möchtest:</p>
        <div class="btn-group">
            <button onclick="copyPrompt('scan')">📋 1a. Normalen Neuscan anfordern</button>
            <button class="secondary" onclick="copyPrompt('fix')">🛠️ 1b. Format-Korrektur anfordern</button>
        </div>
        <div id="promptStatus" class="status-msg"></div>
    </div>

    <div class="step-box">
        <h3>Schritt 2: Ergebnisse verarbeiten</h3>
        <p>Füge hier den Codeblock (Rohmaterial) aus ChatGPT ein:</p>
        <textarea id="rawInput" placeholder="## Proto-Atomic Notes..."></textarea>
        <br><br>
        <button class="secondary" onclick="parseLog()">🗂️ Karten generieren</button>
    </div>

    <div id="board"></div>

    <div id="exportArea" class="hidden actions">
        <div class="btn-group" style="justify-content: center;">
            <button onclick="generatePrompt('claude')">🧠 Prompt für Claude kopieren</button>
            <button class="secondary" onclick="generatePrompt('gpt')">🤖 Prompt für GPT kopieren</button>
        </div>
        <div id="copyStatus" class="status-msg"></div>
    </div>
</div>

<script>
    let logItems = [];

    // Prompt für den ganz normalen Neuscan
    const SCAN_PROMPT = `**Rolle:**
Du bist mein **forensischer Tageslog-Scanner**.
Dein einziges Ziel ist **Vollständigkeit**, nicht Eleganz.

**Normative Basis:**
- CONFIG.md ist geladen und bindend.
- Datenintegrität > Struktur > Extraktion.
- Nichts implizieren. Nichts glätten. Nichts auslassen.

---
## 🎯 ZIEL DES SCANS
Finde **alles**, was sich **potenziell** für eine spätere Weiterverarbeitung eignet... (u.a. Poetry, Proto-Atomic Notes, SOPs, Systembeobachtungen, Zitate)
👉 **Es geht NICHT um Entscheidung oder Qualität, sondern um Sichtbarmachung.**

---
## 🔎 SCAN-REGELN (KRITISCH)
1. Chronologisch, Nachricht für Nachricht (User & Assistant)
2. Maximal inklusiv (Unsicherheit mit '(unsicher)' markieren)
3. Keine Filter, Keine Aufgaben.
4. Poetry / Prosa wortwörtlich übernehmen.

---
## 📦 AUSGABEFORMAT (VERPFLICHTEND)
Genau EIN Markdown-Codeblock. Kein Text davor oder danach.
... (Struktur: Poetry, Proto-Atomic, SOPs, Systembeobachtungen, Zitate)`;

    // Neuer Prompt für die Format-Korrektur
    const FIX_PROMPT = `Deine letzte Ausgabe war strukturell nicht ganz stimmig oder hat das geforderte Format verletzt. 
Bitte korrigiere das jetzt und gib mir die erkannten Kandidaten EXAKT nach den Regeln des Ausgabeformats aus.

**Regeln:**
1. Keine Einleitung, kein Text danach.
2. Genau EIN zusammenhängender Markdown-Codeblock.
3. Jeder Eintrag als Spiegelstrich mit "- [Titel] — Beschreibung (Quelle: ...) (sicher/unsicher)"

Hier ist die gewünschte Struktur für den Codeblock:
\`\`\`markdown
# 📎 MAXIMAL-INKLUSIVER NEUSCAN — ROHMATERIAL

## Poetry / Prosa Freewriting (Kandidaten)
- „…“ (Quelle: …) (sicher/unsicher)

## Proto-Atomic Notes (Kandidaten)
- [Titelvorschlag] — Kernaussage in 1 Satz  
  (Quelle: …) (sicher/unsicher)

## SOPs / Prozesse / Workflows (Kandidaten)
- [SOP-Titel] — Ziel / Problem  
  (Quelle: …) (sicher/unsicher)
\`\`\`

Bitte korrigiere deine letzte Antwort entsprechend!`;

    const RULES_TEMPLATE = `
**KRITISCH — Extraktions-Regeln:**

**Poetry-Freewriting:**
- Ausschließlich wortwörtlich aus deinen Formulierungen.
- Nichts ergänzen, umformulieren oder interpretieren.

**Proto-Atomic Notes:**
- Dürfen synthetisiert werden, nah an Originalworten.
- [[Verweise]] möglich.

**Rezepte:**
- SO DETAILLIERT wie möglich (Mengen, Temperaturen, Zeiten).
- Erfahrungen, Fehler, Tipps & Hacks.

**SOPs:**
- Ziel: Klarheit & Wiederholbarkeit inkl. Mermaid-Diagramm.

**Node-Tags:**
- Jede Node braucht das Tag (z.B. #proto-atomic) direkt UNTER der Überschrift.`;

    function copyPrompt(type) {
        const textToCopy = type === 'scan' ? SCAN_PROMPT : FIX_PROMPT;
        navigator.clipboard.writeText(textToCopy).then(() => {
            const status = document.getElementById('promptStatus');
            status.innerText = type === 'scan' ? "Scan-Prompt kopiert! Ab zu ChatGPT." : "Korrektur-Prompt kopiert! Sag ChatGPT, es soll das Format fixen.";
            setTimeout(() => status.innerText = "", 4000);
        });
    }

    function parseLog() {
        const text = document.getElementById('rawInput').value;
        const lines = text.split('\n');
        logItems = [];
        let currentType = 'Proto';

        lines.forEach(line => {
            if (line.toLowerCase().includes('## poetry')) currentType = 'Poetry';
            else if (line.toLowerCase().includes('## proto-atomic')) currentType = 'Proto';
            else if (line.toLowerCase().includes('sop') || line.toLowerCase().includes('prozesse')) currentType = 'SOP';
            else if (line.toLowerCase().includes('rezept')) currentType = 'Rezept';
            
            if (line.trim().startsWith('- ')) {
                let content = line.replace('- ', '').trim();
                let title = "";
                
                const titleMatch = content.match(/\[(.*?)\]/);
                if (titleMatch) {
                    title = titleMatch[1];
                    content = content.replace(`[${title}]`, '').replace(/^—\s*/, '').trim();
                }

                logItems.push({
                    id: Date.now() + Math.random(),
                    type: currentType,
                    title: title || "Neuer Eintrag",
                    text: content
                });
            }
        });
        renderBoard();
    }

    function renderBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        logItems.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = `card card-${item.type}`;
            card.innerHTML = `
                <div class="controls">
                    <select onchange="updateItem(${index}, 'type', this.value); renderBoard();">
                        <option value="Poetry" ${item.type === 'Poetry' ? 'selected' : ''}>Poetry</option>
                        <option value="Proto" ${item.type === 'Proto' ? 'selected' : ''}>Proto-Note</option>
                        <option value="SOP" ${item.type === 'SOP' ? 'selected' : ''}>SOP</option>
                        <option value="Rezept" ${item.type === 'Rezept' ? 'selected' : ''}>Rezept</option>
                    </select>
                    <input type="text" style="flex-grow:1" value="${item.title}" oninput="updateItem(${index}, 'title', this.value)">
                    <button class="delete" onclick="removeItem(${index})">Löschen</button>
                </div>
                <textarea class="content-edit" oninput="updateItem(${index}, 'text', this.value)">${item.text}</textarea>
            `;
            board.appendChild(card);
        });
        if (logItems.length > 0) {
            document.getElementById('exportArea').classList.remove('hidden');
        } else {
            document.getElementById('exportArea').classList.add('hidden');
        }
    }

    function updateItem(index, key, value) {
        logItems[index][key] = value;
    }

    function removeItem(index) {
        logItems.splice(index, 1);
        renderBoard();
    }

    function buildGptPrompt() {
        let output = "Bitte beachte dabei\n\n# 📎 Zu extrahierende Notizen\n\n";
        
        logItems.forEach(item => {
            if (item.type === 'Poetry') {
                output += `## Poetry Freewriting\n#poetry_freewriting\n${item.text}\n\n`;
            } else if (item.type === 'Proto') {
                output += `## Proto-Atomic Note [${item.title}]\n#proto-atomic\n${item.text}\n\n`;
            } else if (item.type === 'SOP') {
                output += `## Standard Operating Procedure (SOP) [${item.title}]\n#sop\n${item.text}\n\n### Ablauf-Diagramm\n\n\`\`\`mermaid\nflowchart TD\nA[Start] --> B[Schritt 1]\n\`\`\`\n\n`;
            } else if (item.type === 'Rezept') {
                output += `## Rezept: [${item.title}]\n#rezept\n**Beschreibung & Kontext:** ${item.text}\n\n**Zutaten:**\n- \n\n**Zubereitung:**\n1. \n\n**Meine Erfahrungen & Anpassungen:**\n- ✅ Was gut war:\n- ❌ Fehler:\n\n`;
            }
        });

        output += RULES_TEMPLATE;
        return output;
    }

    function buildClaudePrompt() {
        const sectionConfigs = [
            { type: 'Poetry', label: 'Poetry' },
            { type: 'Proto', label: 'Proto-Atomic Notes' },
            { type: 'SOP', label: 'SOPs / Workflows' },
            { type: 'Rezept', label: 'Rezepte' }
        ];

        let output = `=== ROLLE ===
Du bist mein Obsidian-Zettelkasten-Assistent und Markdown-Datei-Generator.

=== AUFGABE ===
Mach mir aus den folgenden Kandidaten einzelne, eigenständige Markdown-Notizen für Obsidian.

=== OUTPUT: EINZELNE MARKDOWN-DATEIEN, KEIN ZIP ===
- Erstelle KEINE ZIP-Datei.
- Erstelle KEIN Archiv.
- Erstelle KEIN Bundle.
- Erstelle KEINE Sammeldatei.
- Gib die Notizen als einzelne Markdown-Dateien aus.
- Jede Notiz braucht einen eigenen Dateinamen.
- Wenn du Dateien direkt erzeugen kannst, erzeuge einzelne .md-Dateien.
- Wenn du keine Dateien direkt erzeugen kannst, gib jede Datei separat in einem eigenen Markdown-Codeblock aus.
- Nicht alles in eine einzige Sammeldatei schreiben.

=== DATEINAMEN UND QUERVERWEISE ===
- Jede Notiz braucht einen eindeutigen Dateinamen.
- Der Dateiname steht explizit über der jeweiligen Notiz.
- Verwende kebab-case.
- Keine Doppelpunkte.
- Keine Sonderzeichen außer Bindestrich.
- Die Datei selbst darf .md heißen.
- In Obsidian-Querverweisen wird die Endung .md aber NIE mitgeschrieben.
- Querverweise müssen so geschrieben werden: [[dateiname]]
- In den doppelten Klammern steht IMMER der Dateiname der Zielnotiz.
- Dort steht NICHT automatisch der Titel der Notiz.
- Beispiel richtig: [[daily-log-review-workflow]]
- Beispiel falsch: [[Daily Log Review Workflow.md]]
- Beispiel falsch: [[Daily Log Review Workflow]], wenn der tatsächliche Dateiname daily-log-review-workflow lautet.

=== TAGGING / NODE-TAGS ===
Übernimm die Logik aus dem GPT-Prompt:
- Jede Notiz braucht passende Tags.
- Jede Notiz braucht direkt unter der Überschrift einen klaren Node-Tag.
- Beispiele:
  - #proto-atomic
  - #poetry_freewriting
  - #sop
  - #rezept
- Tags sollen zusätzlich in YAML-Frontmatter erscheinen.
- Frontmatter enthält mindestens:
  ---
  tags:
    - zettelkasten
    - [passender Typ]
  ---

=== REGELN NACH TYP ===
Poetry / Prosa Freewriting:
- Ausschließlich wortwörtlich aus meinen Formulierungen übernehmen.
- Nichts ergänzen.
- Nichts umformulieren.
- Nichts interpretieren.
- Als eigene Markdown-Datei ausgeben, wenn es als eigenständiger Text sinnvoll ist.
- Node-Tag direkt unter der Überschrift: #poetry_freewriting

Proto-Atomic Notes:
- Dürfen synthetisiert werden.
- Nah an den Originalworten bleiben.
- Eine Notiz soll eine klar erkennbare Kernaussage haben.
- Sinnvolle Querverweise zu anderen erzeugten Notizen setzen.
- Node-Tag direkt unter der Überschrift: #proto-atomic

SOPs / Prozesse / Workflows:
- Ziel: Klarheit und Wiederholbarkeit.
- Schritte klar strukturieren.
- Jede SOP-/Workflow-Notiz braucht einen Abschnitt „## Ablauf-Diagramm“.
- Darunter muss ein Mermaid-Codeblock stehen.
- Verwende bevorzugt flowchart TD.
- Das Diagramm soll den im Kandidaten beschriebenen Ablauf sichtbar machen.
- Wenn der Ablauf unvollständig ist, erstelle ein vorsichtiges Minimaldiagramm aus den belegten Schritten und markiere offene Stellen als „offen“.
- Keine Schritte erfinden.
- Node-Tag direkt unter der Überschrift: #sop

Rezepte:
- So detailliert wie möglich.
- Mengen, Temperaturen, Zeiten, Erfahrungen, Fehler, Tipps und Hacks übernehmen, wenn vorhanden.
- Nicht raten.
- Fehlende Angaben als offen markieren.
- Node-Tag direkt unter der Überschrift: #rezept

=== ALLGEMEINE REGELN ===
- Keine erfundenen Fakten ergänzen.
- Unsicherheiten markieren.
- Sehr ähnliche Kandidaten dürfen zusammengeführt werden, wenn sie offensichtlich dieselbe Notiz ergeben.
- Erstelle nur sinnvolle Querverweise, kein Link-Spam.
- Querverweise nur auf Notizen setzen, deren Dateiname du selbst im Output definiert hast.
- Wenn du eine Notiz verlinkst, muss diese Zielnotiz auch tatsächlich im Output existieren.

=== AUSGABEFORMAT ===
Wenn Dateien nicht direkt erzeugt werden können, verwende dieses Format:

---FILE---
FILENAME: beispiel-dateiname.md

\`\`\`markdown
---
tags:
  - zettelkasten
  - proto-atomic
---

# Titel der Notiz
#proto-atomic

Inhalt der Notiz mit sinnvollen [[anderen-dateinamen]].
\`\`\`

---FILE---
FILENAME: beispiel-workflow.md

\`\`\`markdown
---
tags:
  - zettelkasten
  - sop
---

# Beispiel Workflow
#sop

Kurze Beschreibung des Workflows.

## Schritte

1. Erster belegter Schritt
2. Zweiter belegter Schritt
3. Offener Schritt, falls unklar

## Ablauf-Diagramm

\`\`\`mermaid
flowchart TD
A[Start] --> B[Erster Schritt]
B --> C[Zweiter Schritt]
C --> D[Ergebnis oder offene Stelle]
\`\`\`
\`\`\`

Wichtig:
- Jede Datei separat ausgeben.
- Keine ZIP-Datei.
- Keine Sammeldatei.
- Keine Dateinamen in Querverweisen mit .md-Endung.
- SOP-Dateien enthalten immer einen Mermaid-Abschnitt „## Ablauf-Diagramm“.

# Zu verarbeitende Kandidaten

`;

        sectionConfigs.forEach(section => {
            output += `## ${section.label}\n\n`;
            const items = logItems.filter(item => item.type === section.type);

            if (items.length === 0) {
                output += '_Keine Einträge._\n\n';
                return;
            }

            items.forEach(item => {
                output += `### ${item.title || 'Ohne Titel'}\n\n${item.text}\n\n`;
            });
        });

        return output;
    }

    function generatePrompt(target) {
        let output = '';
        const promptTarget = target === 'claude' ? 'claude' : 'gpt';

        if (promptTarget === 'claude') {
            output = buildClaudePrompt();
        } else {
            output = buildGptPrompt();
        }

        navigator.clipboard.writeText(output).then(() => {
            const status = document.getElementById('copyStatus');
            status.innerText = promptTarget === 'claude' ? "Claude-Prompt kopiert!" : "GPT-Prompt kopiert!";
            setTimeout(() => status.innerText = "", 4000);
        });
    }
</script>

</body>
</html>
